server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # Serve React app — all routes fallback to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy API requests to backend
  # Host header must be the backend's own FQDN — Azure Container Apps routes by Host.
  location /api/ {
    proxy_pass http://BACKEND_HOST_PLACEHOLDER;
    proxy_http_version 1.1;
    proxy_set_header Host BACKEND_HOST_PLACEHOLDER;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 60s;
  }

  # Proxy WebSocket requests to backend
  location /ws/ {
    proxy_pass http://BACKEND_HOST_PLACEHOLDER;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host BACKEND_HOST_PLACEHOLDER;
    proxy_read_timeout 3600s;
  }
}
